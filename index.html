<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Ethical Zone - Ethical Hacking Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto+Mono:wght@400;700&display=swap');
        body { font-family: 'Roboto Mono', monospace; }
        
        .hero-bg {
            position: relative;
            overflow: hidden;
            height: 100vh;
        }
        .hero-video {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: -2;
        }
        .hero-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.85));
            z-index: -1;
        }
        .dragon-logo { filter: drop-shadow(0 0 20px #22c55e); }
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">

    <!-- Navbar -->
    <nav class="bg-black border-b border-green-500 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-green-500 rounded-full flex items-center justify-center text-3xl dragon-logo overflow-hidden">
                    <img src="logo.jpg" alt="Dragon Ethical Zone" class="w-full h-full object-contain">
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-widest text-green-400">DRAGON</h1>
                    <p class="text-xs text-green-500 -mt-1">ETHICAL ZONE</p>
                </div>
            </div>
            <div class="hidden md:flex gap-8 text-sm font-medium">
                <a href="#home" class="hover:text-green-400 transition-colors">HOME</a>
                <a href="#mission" class="hover:text-green-400 transition-colors">MISSION</a>
                <a href="#stats" class="hover:text-green-400 transition-colors">STATS</a>
                <a href="#team" class="hover:text-green-400 transition-colors">TEAM</a>
                <a href="#join" class="hover:text-green-400 transition-colors">JOIN</a>
            </div>
            <a href="https://t.me/+14bH_CrGbJ1kNTQ9" target="_blank" class="bg-green-600 hover:bg-green-500 px-6 py-2 rounded-full text-sm font-semibold transition-colors flex items-center gap-2">
                <i class="fab fa-telegram"></i> JOIN TELEGRAM
            </a>
        </div>
    </nav>

    <!-- Hero -->
    <section id="home" class="hero-bg flex items-center">
        <video class="hero-video" autoplay loop muted playsinline poster="https://picsum.photos/id/1015/1920/1080">
            <source src="https://assets.mixkit.co/videos/preview/3460/3460-large.mp4" type="video/mp4">
            <source src="https://assets.mixkit.co/videos/preview/684/684-large.mp4" type="video/mp4">
            <source src="https://assets.mixkit.co/videos/preview/3463/3463-large.mp4" type="video/mp4">
        </video>
        
        <div class="hero-overlay"></div>

        <div class="max-w-7xl mx-auto px-6 text-center relative z-10">
            <div class="mb-8">
                <div class="inline-flex items-center gap-4 bg-zinc-900/80 px-8 py-3 rounded-2xl border border-green-500/30">
                    <div class="w-16 h-16 bg-green-500/10 rounded-xl flex items-center justify-center text-5xl overflow-hidden">
                        <img src="logo.jpg" alt="Dragon Ethical Zone" class="w-14 h-14 object-contain">
                    </div>
                    <div class="text-left">
                        <h1 class="text-6xl md:text-7xl font-bold tracking-tighter text-white">DRAGON ETHICAL ZONE</h1>
                        <p class="text-green-400 text-xl mt-2">Where Ethics Meet Expertise</p>
                    </div>
                </div>
            </div>
            <p class="max-w-2xl mx-auto text-xl text-zinc-300 mb-10">
                Bangladesh's Premier Ethical Hacking &amp; Cybersecurity Community
            </p>
            <div class="flex flex-col sm:flex-row gap-4 justify-center">
                <a href="https://www.facebook.com/share/1CjvLQX1az/" target="_blank" class="bg-blue-600 hover:bg-blue-500 px-10 py-4 rounded-xl text-lg font-semibold flex items-center justify-center gap-3 transition-all">
                    <i class="fab fa-facebook"></i> JOIN FACEBOOK GROUP
                </a>
                <a href="#join" class="border border-green-500 hover:bg-green-500/10 px-10 py-4 rounded-xl text-lg font-semibold flex items-center justify-center gap-3 transition-all">
                    EXPLORE COMMUNITY
                </a>
            </div>
        </div>
    </section>

    <!-- বাকি সেকশনগুলো আগের মতো রাখো (Mission, Stats, Team, Join, Footer) -->
    <!-- আগের কোড থেকে কপি করে নিচে পেস্ট করো -->

    <script>
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                if (this.getAttribute('href').length > 1) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) target.scrollIntoView({ behavior: 'smooth' });
                }
            });
        });
    </script>
</body>
</html>
